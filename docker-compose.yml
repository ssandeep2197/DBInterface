services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rootpw}
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-p${MYSQL_PASSWORD:-rootpw}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      API_PORT: 8082
      SESSION_SECRET: ${SESSION_SECRET:-please-change-me-please-change-me-please}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rootpw}
    ports:
      - '8082:8082'

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_URL: ''
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  mysql-data:
