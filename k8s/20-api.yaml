apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbi-api
  namespace: dbinterface
  labels:
    app: dbi-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: dbi-api
  template:
    metadata:
      labels:
        app: dbi-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: dbinterface-api:__IMAGE_TAG__
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: dbi-config
            - secretRef:
                name: dbi-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: dbi-api
  namespace: dbinterface
spec:
  type: ClusterIP
  selector:
    app: dbi-api
  ports:
    - name: http
      port: 8082
      targetPort: http
