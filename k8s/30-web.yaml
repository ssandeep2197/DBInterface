apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbi-web
  namespace: dbinterface
  labels:
    app: dbi-web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: dbi-web
  template:
    metadata:
      labels:
        app: dbi-web
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: dbinterface-web:__IMAGE_TAG__
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "SETGID", "SETUID", "NET_BIND_SERVICE"]
---
apiVersion: v1
kind: Service
metadata:
  name: dbi-web
  namespace: dbinterface
spec:
  type: ClusterIP
  selector:
    app: dbi-web
  ports:
    - name: http
      port: 80
      targetPort: http
