apiVersion: v1
kind: ConfigMap
metadata:
  name: dbi-config
  namespace: dbinterface
data:
  NODE_ENV: production
  LOG_LEVEL: info
  API_PORT: "8082"
  SESSION_MAX_AGE_MS: "3600000"
  CORS_ORIGIN: https://__DOMAIN__
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "300"
  BLOCK_PRIVATE_HOSTS: "true"
  CROSS_SITE_COOKIES: "false"
  FORCE_HTTPS: "true"
